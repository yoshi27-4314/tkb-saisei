<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テイクバック再生事業 - スマホプレビュー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ツールバー */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    flex-shrink: 0;
  }

  .toolbar label {
    color: #C5A258;
    font-size: 13px;
    font-weight: 700;
  }

  .toolbar select {
    background: #444;
    color: #fff;
    border: 1px solid #666;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
  }

  .toolbar button {
    background: #555;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  .toolbar button:hover {
    background: #C5A258;
  }

  .toolbar .size-label {
    color: #888;
    font-size: 12px;
    margin-left: auto;
  }

  /* プレビューエリア */
  .preview-area {
    flex: 1;
    display: flex;
    justify-content: center;
    overflow: hidden;
    background: #1a1a1a;
  }

  .preview-area iframe {
    border: none;
    border-left: 2px solid #333;
    border-right: 2px solid #333;
    background: #fff;
    display: block;
    height: 100%;
  }
</style>
</head>
<body>

<div class="toolbar">
  <label>TKB Preview</label>
  <select id="deviceSelect" onchange="changeDevice()">
    <option value="390">iPhone 14 (390px)</option>
    <option value="393">iPhone 15 (393px)</option>
    <option value="430">iPhone 15 Pro Max (430px)</option>
    <option value="375">iPhone 13 mini (375px)</option>
    <option value="360">Android (360px)</option>
    <option value="412">Pixel 7 (412px)</option>
    <option value="768">iPad mini (768px)</option>
    <option value="100%">PC全幅</option>
  </select>
  <button onclick="reloadPreview()">&#x21bb; Reload</button>
  <span class="size-label" id="sizeLabel">390px / F5でリロード</span>
</div>

<div class="preview-area">
  <iframe id="previewFrame" src="index.html" width="390"></iframe>
</div>

<script>
  function changeDevice() {
    const val = document.getElementById('deviceSelect').value;
    const iframe = document.getElementById('previewFrame');
    if (val === '100%') {
      iframe.style.width = '100%';
      iframe.style.borderLeft = 'none';
      iframe.style.borderRight = 'none';
      document.getElementById('sizeLabel').textContent = '全幅 / F5でリロード';
    } else {
      iframe.style.width = val + 'px';
      iframe.width = val;
      iframe.style.borderLeft = '2px solid #333';
      iframe.style.borderRight = '2px solid #333';
      document.getElementById('sizeLabel').textContent = val + 'px / F5でリロード';
    }
  }

  function reloadPreview() {
    const iframe = document.getElementById('previewFrame');
    iframe.src = 'index.html?t=' + Date.now();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'F5') {
      e.preventDefault();
      reloadPreview();
    }
  });
</script>

</body>
</html>
